<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Ingresar — Estudio Molina y Asociados</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    body { background: #1F4E79; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .login-card { width:100%; max-width:380px; border:none; border-radius:14px; box-shadow:0 8px 32px rgba(0,0,0,.25); }
    .login-header { background:#1F4E79; color:#fff; border-radius:14px 14px 0 0; padding:28px; text-align:center; }
    .login-header h4 { font-weight:700; margin:0; }
    .login-header small { opacity:.7; font-size:12px; }
    .login-body { padding:28px; background:#fff; border-radius:0 0 14px 14px; }
    .form-control:focus { border-color:#2E75B6; box-shadow:0 0 0 .2rem rgba(46,117,182,.2); }
    .btn-login { background:#1F4E79; color:#fff; border:none; width:100%; padding:10px; border-radius:8px; font-weight:600; }
    .btn-login:hover { background:#2E75B6; color:#fff; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-header">
      <div style="font-size:2.5rem; margin-bottom:8px;"><i class="bi bi-building"></i></div>
      <h4>Estudio Molina y Asociados</h4>
      <small>Belgrano N° 517 — Orán, Salta</small>
    </div>
    <div class="login-body">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for cat, msg in messages %}
            <div class="alert alert-{{ cat }} py-2 small">{{ msg }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}
      <form method="POST">
        <div class="mb-3">
          <label class="form-label fw-600 small">Usuario</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" name="username" class="form-control" placeholder="molina / salas" required autofocus/>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label small">Contraseña</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control" required/>
          </div>
        </div>
        <button type="submit" class="btn-login">Ingresar</button>
      </form>
    </div>
  </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
