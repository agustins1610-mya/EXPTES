{% extends 'base.html' %}
{% block title %}Nuevo Recibo{% endblock %}
{% block topbar_title %}<i class="bi bi-receipt me-2"></i>Registrar Recibo{% endblock %}
{% block topbar_actions %}
  <a href="{{ url_for('honorarios_list') }}" class="btn btn-sm btn-outline-secondary">
    <i class="bi bi-arrow-left"></i> Volver
  </a>
{% endblock %}

{% block content %}
<div class="card border-0 shadow-sm" style="max-width:600px">
  <div class="card-body">
    <form method="POST">
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label small fw-bold">Expediente *</label>
          <select name="expediente_id" class="form-select" required>
            <option value="">— Seleccionar —</option>
            {% for e in expedientes %}
              <option value="{{ e.id }}" {{ 'selected' if exp_id and exp_id|int == e.id }}>
                {{ e.codigo }} — {{ e.caratula[:80] }}
              </option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label small fw-bold">Monto ($) *</label>
          <input type="number" name="monto" class="form-control" step="0.01" required placeholder="0"/>
        </div>
        <div class="col-md-6">
          <label class="form-label small fw-bold">Fecha</label>
          <input type="text" name="fecha" class="form-control" placeholder="DD/MM/AAAA"/>
        </div>
        <div class="col-md-6">
          <label class="form-label small fw-bold">Forma de Pago *</label>
          <select name="forma_pago" class="form-select" required>
            {% for f in formas_pago %}
              <option value="{{ f }}">{{ f }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label small fw-bold">Estado</label>
          <select name="estado" class="form-select">
            {% for e in estados %}
              <option value="{{ e }}" {{ 'selected' if e == 'Cobrado' }}>{{ e }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-12">
          <label class="form-label small fw-bold">Concepto / Etapa</label>
          <textarea name="concepto" class="form-control" rows="2"
            placeholder="Ej: Pago inicial de honorarios, Cuota 1/5, etc."></textarea>
        </div>
      </div>
      <div class="mt-4 d-flex gap-2">
        <button type="submit" class="btn btn-info text-white">
          <i class="bi bi-save me-1"></i>Registrar Recibo
        </button>
        <a href="{{ url_for('honorarios_list') }}" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
