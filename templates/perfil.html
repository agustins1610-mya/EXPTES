{% extends 'base.html' %}
{% block title %}Cambiar Contraseña{% endblock %}
{% block topbar_title %}<i class="bi bi-key me-2"></i>Mi Perfil{% endblock %}

{% block content %}
<div class="card border-0 shadow-sm" style="max-width:420px">
  <div class="card-body">
    <div class="mb-3">
      <div class="fw-bold">{{ current_user.nombre }}</div>
      <div class="text-muted small">M.P. {{ current_user.matricula }} — @{{ current_user.username }}</div>
    </div>
    <hr/>
    <h6 class="fw-bold mb-3">Cambiar contraseña</h6>
    <form method="POST">
      <div class="mb-3">
        <label class="form-label small">Contraseña actual</label>
        <input type="password" name="actual" class="form-control" required/>
      </div>
      <div class="mb-3">
        <label class="form-label small">Nueva contraseña</label>
        <input type="password" name="nueva" class="form-control" required minlength="6"/>
        <div class="form-text">Mínimo 6 caracteres.</div>
      </div>
      <button type="submit" class="btn btn-primary">Actualizar contraseña</button>
    </form>
  </div>
</div>
{% endblock %}
