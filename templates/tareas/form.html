{% extends 'base.html' %}
{% block title %}{{ action }} Tarea{% endblock %}
{% block topbar_title %}<i class="bi bi-check2-square me-2"></i>{{ action }} Tarea{% endblock %}
{% block topbar_actions %}
  <a href="{{ url_for('tareas_list') }}" class="btn btn-sm btn-outline-secondary">
    <i class="bi bi-arrow-left"></i> Volver
  </a>
{% endblock %}

{% block content %}
<div class="card border-0 shadow-sm" style="max-width:680px">
  <div class="card-body">
    <form method="POST">
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label small fw-bold">Expediente *</label>
          <select name="expediente_id" class="form-select" required id="sel-exp">
            <option value="">— Seleccionar —</option>
            {% for e in expedientes %}
              <option value="{{ e.id }}"
                {{ 'selected' if (tarea and tarea.expediente_id == e.id) or (exp_id and exp_id|int == e.id) }}>
                {{ e.codigo }} — {{ e.caratula[:80] }}
              </option>
            {% endfor %}
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label small fw-bold">Tipo *</label>
          <select name="tipo" class="form-select" required>
            {% for t in tipos %}
              <option value="{{ t }}" {{ 'selected' if tarea and tarea.tipo == t }}>{{ t }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label small fw-bold">Responsable *</label>
          <select name="responsable" class="form-select" required>
            {% for r in responsables %}
              <option value="{{ r }}" {{ 'selected' if tarea and tarea.responsable == r }}>{{ r }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="col-12">
          <label class="form-label small fw-bold">Descripción *</label>
          <textarea name="descripcion" class="form-control" rows="3" required
            placeholder="Detalle de la tarea o audiencia">{{ tarea.descripcion if tarea else '' }}</textarea>
        </div>

        <div class="col-md-6">
          <label class="form-label small fw-bold">Fecha</label>
          <input type="text" name="fecha" class="form-control"
            placeholder="DD/MM/AAAA" value="{{ tarea.fecha if tarea else '' }}"/>
        </div>
        <div class="col-md-6">
          <label class="form-label small fw-bold">Vencimiento</label>
          <input type="text" name="vencimiento" class="form-control"
            placeholder="DD/MM/AAAA" value="{{ tarea.vencimiento if tarea else '' }}"/>
        </div>

        <div class="col-md-6">
          <label class="form-label small fw-bold">Estado</label>
          <select name="estado" class="form-select">
            {% for e in estados %}
              <option value="{{ e }}" {{ 'selected' if tarea and tarea.estado == e }}>{{ e }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="mt-4 d-flex gap-2">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-save me-1"></i>{{ 'Guardar cambios' if action == 'Editar' else 'Crear Tarea' }}
        </button>
        <a href="{{ url_for('tareas_list') }}" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
